<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/dfd85ede10.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="songplay.css">
</head>

<body>
    <div class="shareIcon" id="shareIcon">

    </div>
    <div class="share" id="share" onclick="shareclose(this)">

    </div>
    <div class="mainTop">
        <div class="upper">
            <div class="container">
                <!-- menu start -->
                <div class="menu row">
                    <div class="col icon icon1">
                        <img src="music/logo.png">
                    </div>
                    <div class="col icon icon2">
                        <div class="searchIcon text">
                            <input type="text">
                            <span><i class="fa fa-search">&nbsp; &nbsp;</i>Search</span>
                        </div>
                    </div>
                    <div class="col icon icon3">
                        <img src="music/profile.png">
                    </div>
                </div>
                <br>
                <!-- menu end -->
            </div>
            <!-- image and text starting -->
            <div class="image">
                <img src="music/kesariyaimg.png">
            </div>
            <div class="heading">
                <p>Kesariya (Brahmāstra)</p>
            </div>
            <div class="copy">
                <p>Pritam, Arijit Singh and Amitabh Bhattacharya</p>
            </div>
            <!-- image and text end -->
            <br>
            <br>
            <!-- audio waves start -->
            <div class="row2">
                <div class="audiowaves">
                    <div class="rect1 col high">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect2 col low">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect3 col high">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect4 col low">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect5 col high">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect6 col low">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect7 col high">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect8 col low">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect9 col high">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect10 col low">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect11 col high">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect12 col low">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect13 col high">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect14 col low">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect15 col high">
                    </div>
                </div>
                <div class="audiowaves">
                    <div class="rect16 col low">
                    </div>
                </div>
            </div>
            <!-- audio waves end -->
            <br>
            <br>
            <!-- icons start 1 -->
            <div class="row">
                <div class="10back col">
                    <img src="music/10back.png">
                </div>
                <div class="back col">
                    <i class="fa-solid fa-backward-fast"></i>
                </div>
                <div class="play col" onclick="abc()">
                    <audio src="music/Kesariya.mp3" id="kesariya"></audio>
                    <i class="fa-solid fa-play" style="font-size: 1.5rem;" id="playPause"></i>
                </div>
                <div class="forward col">
                    <a href="3_music_ui_fav_pathaan.html" class="forwardIcon"> <i
                            class="fa-solid fa-forward-fast"></i></a>
                </div>
                <div class="10back col">
                    <img src="music/10forward.png">
                </div>
            </div>
            <!-- icons end 1-->
            <br>
            <!-- icons start 2 -->
            <div class="row">
                <div class="playagain col">
                    <img src="music/playagain.png">
                </div>
                <div class="download col">
                    <img src="music/download.png">
                </div>
                <div class="hearts col">
                    <i class="fa-solid fa-heart"></i>
                </div>
                <div class="share1 col" onclick="share()">
                    <img src="music/share.png">
                </div>
            </div>
            <!-- icons end 2-->
        </div>
        <div class="mainFoot">
            <!-- footer start -->
            <div class="footer row">
                <!-- <div class="rectangle">
                <img src="music/rectangle.png">
            </div> -->
                <div class="library">
                    <img src="music/library.png" alt="">
                </div>
                <div class="heart">
                    <i class="fa-solid fa-heart"></i>
                </div>
                <div class="home">
                    <i class="fa-solid fa-house"></i>
                </div>
                <div class="shuffle">
                    <i class="fa-solid fa-shuffle"></i>
                </div>
                <div class="notification">
                    <i class="fa-solid fa-bell"></i>
                </div>
            </div>
            <!-- footer end -->
        </div>
    </div>

    <script>
        let x = document.getElementById("playPause");
        let high = document.querySelectorAll(".high")
        let low = document.querySelectorAll(".low")
        function abc() {
            if (x.className == "fa-solid fa-play") {

                document.getElementById("kesariya").play();

                document.getElementById("playPause").classList.replace("fa-play", "fa-pause");
                high.forEach(function (z) { z.style.animationPlayState = "running"; })
                low.forEach(function (a) { a.style.animationPlayState = "running"; })

            }


            else {
                document.getElementById("kesariya").pause();

                document.getElementById("playPause").classList.replace("fa-pause", "fa-play");
                high.forEach(function (b) { b.style.animationPlayState = "paused"; })
                low.forEach(function (c) { c.style.animationPlayState = "paused"; })
            }

        }

        function share() {
            document.getElementById("share").style.display = "block";
            document.getElementById("shareIcon").style.display = "flex";

        }

        function shareclose(x) {
            x.style.display = "none";
            document.getElementById("shareIcon").style.display = "none";
        }
    </script>
</body>

</html>
